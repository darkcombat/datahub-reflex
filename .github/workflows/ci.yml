name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Unit tests
        run: python -m pytest tests/unit/ -v --tb=short

      - name: Evaluation tests
        run: python -m pytest tests/evaluation/ -v --tb=short

      - name: UI tests
        run: python -m pytest tests/ui/ -v --tb=short

      - name: Full test report
        if: always()
        run: python -m pytest tests/unit/ tests/evaluation/ tests/ui/ -q --tb=line -m "not requires_datahub"

# Legacy local DataHub compose file for development reference.
#
# The verified live path for this project is the official DataHub Quickstart:
#     python -m datahub docker quickstart
#
# Do not use this file as the submission's reproducibility command. Its image
# tags are older than the tested DataHub OSS v1.5.0.6 Quickstart and may also
# conflict with an already-running Quickstart on ports 8080/9002.
#
# DataHub OSS quickstart for DataHub Reflex development
#
# KNOWN DOCKER TAG ISSUES (DataHub community, not Reflex):
# Multiple acryldata tags have startup issues. If one fails, try another:
#   Option 1: acryldata/datahub-gms:quickstart (large pull but most recent)
#   Option 2: python -m datahub docker quickstart (official CLI, auto-configures)
#   Option 3: Use an existing DataHub instance at DATAHUB_GMS_URL
#
# Reflex works WITHOUT DataHub for all tests and evaluation.
# The spike (spike-01) is the only component requiring a live DataHub.

services:
  datahub-gms:
    image: acryldata/datahub-gms:v0.14.0.2
    container_name: reflex-datahub-gms
    hostname: datahub-gms
    ports: ["8080:8080"]
    environment:
      DATAHUB_SERVER_TYPE: quickstart
      DATAHUB_TELEMETRY_ENABLED: "false"
      ELASTICSEARCH_USE_SSL: "false"
      ELASTICSEARCH_SCHEME: http
      OPENSEARCH_USE_SSL: "false"
      SKIP_ELASTICSEARCH_CHECK: "false"
      EBEAN_DATASOURCE_USERNAME: datahub
      EBEAN_DATASOURCE_PASSWORD: datahub
      EBEAN_DATASOURCE_HOST: mysql:3306
      EBEAN_DATASOURCE_URL: jdbc:mysql://mysql:3306/datahub?verifyServerCertificate=false&useSSL=true&useUnicode=yes&characterEncoding=UTF-8
      EBEAN_DATASOURCE_DRIVER: com.mysql.cj.jdbc.Driver
      KAFKA_BOOTSTRAP_SERVER: broker:29092
      KAFKA_SCHEMAREGISTRY_URL: http://schema-registry:8081
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: "9200"
      NEO4J_HOST: http://neo4j:7474
      NEO4J_URI: bolt://neo4j
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: datahub
      GRAPH_SERVICE_IMPL: neo4j
      ENTITY_REGISTRY_CONFIG_PATH: /datahub/datahub-gms/resources/entity-registry.yml
      AUTHENTICATION_ENABLED: "false"
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  datahub-frontend-react:
    image: acryldata/datahub-frontend-react:v0.14.0.2
    container_name: reflex-datahub-frontend
    hostname: datahub-frontend-react
    ports: ["9002:9002"]
    environment:
      DATAHUB_GMS_HOST: datahub-gms
      DATAHUB_GMS_PORT: "8080"
      DATAHUB_SECRET: YouKnowNothing
      DATAHUB_APP_VERSION: "1.0"
      DATAHUB_PLAY_MEM_BUFFER_SIZE: 10MB
      JAVA_OPTS: -Xms512m -Xmx512m -Dhttp.port=9002
      DATAHUB_TRACKING_TOPIC: MetadataChangeLog_Timeseries_v1
      KAFKA_BOOTSTRAP_SERVER: broker:29092
    depends_on: [datahub-gms]
    restart: on-failure

  mysql:
    image: mysql:8.0
    container_name: reflex-mysql
    hostname: mysql
    ports: ["3306:3306"]
    environment:
      MYSQL_DATABASE: datahub
      MYSQL_USER: datahub
      MYSQL_PASSWORD: datahub
      MYSQL_ROOT_PASSWORD: datahub
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pdatahub"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: on-failure
    volumes: [mysql-data:/var/lib/mysql]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: reflex-zookeeper
    hostname: zookeeper
    ports: ["2181:2181"]
    environment:
      ZOOKEEPER_CLIENT_PORT: "2181"
      ZOOKEEPER_TICK_TIME: "2000"
    restart: on-failure

  broker:
    image: confluentinc/cp-kafka:7.4.0
    container_name: reflex-broker
    hostname: broker
    ports: ["9092:9092", "29092:29092"]
    environment:
      KAFKA_BROKER_ID: "1"
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
    depends_on: [zookeeper]
    restart: on-failure

  schema-registry:
    image: confluentinc/cp-schema-registry:7.4.0
    container_name: reflex-schema-registry
    hostname: schema-registry
    ports: ["8081:8081"]
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: broker:29092
      SCHEMA_REGISTRY_KAFKASTORE_CONNECTION_URL: zookeeper:2181
    depends_on: [broker]
    restart: on-failure

  elasticsearch:
    image: docker.io/opensearchproject/opensearch:2.11.0
    container_name: reflex-elasticsearch
    hostname: elasticsearch
    ports: ["9200:9200"]
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: -Xms256m -Xmx512m
    restart: on-failure
    volumes: [es-data:/usr/share/opensearch/data]

  neo4j:
    image: neo4j:4.4.9-community
    container_name: reflex-neo4j
    hostname: neo4j
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: neo4j/datahub
      NEO4J_dbms_memory_pagecache_size: 512m
      NEO4J_dbms_memory_heap_max__size: 512m
    restart: on-failure
    volumes: [neo4j-data:/data]

volumes:
  mysql-data:
  es-data:
  neo4j-data:
